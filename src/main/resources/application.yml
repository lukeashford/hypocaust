spring:
  threads:
    virtual:
      enabled: true
  application:
    name: hypocaust
  security:
    oauth2:
      resourceserver:
        jwt:
          # Spring Boot will automatically fetch JWKS from {issuer-uri}/.well-known/openid-configuration
          issuer-uri: ${CLERK_ISSUER_URI:https://clerk.example.com}
  datasource:
    url: jdbc:postgresql://localhost:7888/hypocaust
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  host-url: ${HOST_URL:https://localhost}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  rag:
    platforms-path: ${PLATFORMS_PATH:src/main/resources/rag/platforms}
    workflows-path: ${WORKFLOWS_PATH:src/main/resources/rag/workflows}
  llm:
    openai:
      api-key: ${OPENAI_API_KEY}

      chat:
        gpt-5: # Flagship generalist; strong tool use. Check models page for current limits.
          topP: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 4096    # safe default; lift if you need longer answers

        "[gpt-5.2]": # Latest flagship with enhanced creativity; ideal for creative writing tasks.
          topP: 1.0
          temperature: 0.9
          presencePenalty: 0.1
          frequencyPenalty: 0.1
          maxCompletionTokens: 4096

        gpt-4o: # Multimodal generalist; typical ctx ~128K per OpenAI era guidance.
          temperature: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 4096

        gpt-4o-mini: # Context window 128K; up to 16K output; great cost/perf.
          temperature: 0.2
          topP: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 16000   # vendor-stated output max

        o3: # Use maxCompletionTokens on Chat Completions; Responses API uses max_output_tokens.
          topP: 1.0
          maxCompletionTokens: 1024    # caps *visible + reasoning* tokens on Chat Completions
          reasoning-effort: medium             # low|medium|high (supported for o3 family)

      embedding: # 3-small supports dimension shortening; vendor post recommends dims control.
        text-embedding-3-small:
          dimensions: 1536            # default; may set 512 for cheaper vectors
          encodingFormat: float

    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        claude-opus-4-6:
          maxTokens: 4096
          temperature: 0.4

        claude-sonnet-4-6:
          maxTokens: 2048
          temperature: 0.5

        claude-haiku-4-5:
          maxTokens: 1024
          temperature: 0.3

  replicate:
    api-token: ${REPLICATE_API_TOKEN:}
  fal:
    api-key: ${FAL_API_KEY:}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
  runway:
    api-key: ${RUNWAY_API_KEY:}
  elevenlabs:
    api-key: ${ELEVENLABS_API_KEY:}
  assemblyai:
    api-key: ${ASSEMBLYAI_API_KEY:}
  ffmpeg:
    base-url: ${FFMPEG_BASE_URL:http://localhost:8100}
    api-key: ${FFMPEG_API_KEY:dev-key}

  storage:
    provider: ${STORAGE_PROVIDER:r2}
    bucket-name: ${STORAGE_BUCKET:hypocaust}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
    r2:
      account-id: ${R2_ACCOUNT_ID:dummy-account-id}
      access-key: ${R2_ACCESS_KEY:dummy-access-key}
      secret-key: ${R2_SECRET_KEY:dummy-secret-key}
  
  sse:
    heartbeat:
      interval-seconds: 20
    connection:
      timeout-millis: 0              # 0 = no timeout
    shutdown:
      grace-period-seconds: 5