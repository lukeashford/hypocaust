spring:
  application:
    name: the_machine
  datasource:
    url: jdbc:postgresql://localhost:7888/the_machine
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  llm:
    openai:
      api-key: ${OPENAI_API_KEY}
      models:
        gpt4o:
          model: gpt-4o
          temperature: 0.2
          maxTokens: 128000          # input context max
        gpt4omini:
          model: gpt-4o-mini
          temperature: 0.3
          maxTokens: 128000          # input context max
        o3:
          model: o3                  # or "o3-pro" if you use that variant
          temperature: null          # reasoning models ignore temperature
          maxTokens: 200000          # input context max (output max ~100k)
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      models:
        sonnet4:
          # Prefer the dated ID when possible:
          model: claude-sonnet-4-20250514
          temperature: 0.2
          maxTokens: 1000000
  data:
    base-path: ${DATA_PATH:./data}
  sse:
    heartbeat:
      interval-seconds: 20
    connection:
      timeout-millis: 0              # 0 = no timeout
    shutdown:
      grace-period-seconds: 5

  executor:
    run:
      thread-pool:
        core-threads: 2
        max-threads: 5
      task-queue:
        max-capacity: 10
      idle-thread:
        keep-alive-seconds: 60
      shutdown:
        grace-period-seconds: 5