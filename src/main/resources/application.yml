spring:
  application:
    name: the_machine
  datasource:
    url: jdbc:postgresql://localhost:7888/the_machine
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}