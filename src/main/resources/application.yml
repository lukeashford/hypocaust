spring:
  application:
    name: the_machine
  datasource:
    url: jdbc:postgresql://localhost:7888/the_machine
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  llm:
    platforms:
      openai:
        api-key: ${OPENAI_API_KEY:"openai-api-key"}
        models:
          o3:
            params:
              model: o3
              maxCompletionTokens: 100000
              reasoningEffort: high
          gpt4o:
            params:
              model: gpt-4o
              temperature: 0.2
          4o-mini:
            params:
              model: gpt-4o-mini
              temperature: 0.3
      anthropic:
        api-key: ${ANTHROPIC_API_KEY:"anthropic-api-key"}
  #        models:
  #          sonnet4:
  #            params:
  #              # Prefer the dated ID when possible:
  #              model: claude-sonnet-4-20250514
  #              temperature: 0.2
  #              maxTokens: 200000
  data:
    base-path: ${DATA_PATH:./data}
  sse:
    heartbeat:
      interval-seconds: 20
    connection:
      timeout-millis: 0              # 0 = no timeout
    shutdown:
      grace-period-seconds: 5

  executor:
    run:
      thread-pool:
        core-threads: 2
        max-threads: 5
      task-queue:
        max-capacity: 10
      idle-thread:
        keep-alive-seconds: 60
      shutdown:
        grace-period-seconds: 5