spring:
  application:
    name: hypocaust
  datasource:
    url: jdbc:postgresql://localhost:7888/hypocaust
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  host-url: ${HOST_URL:https://localhost}
  rag:
    platforms-path: ${PLATFORMS_PATH:src/main/resources/rag/platforms}
    workflows-path: ${WORKFLOWS_PATH:src/main/resources/rag/workflows}
  llm:
    orchestration-model-name: "claude-sonnet-4-latest"
    decomposing-model-name: "claude-opus-4-5-latest"

    openai:
      api-key: ${OPENAI_API_KEY}

      chat:
        gpt-5: # Flagship generalist; strong tool use. Check models page for current limits.
          topP: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 4096    # safe default; lift if you need longer answers

        gpt-5.2: # Latest flagship with enhanced creativity; ideal for creative writing tasks.
          topP: 1.0
          temperature: 0.9
          presencePenalty: 0.1
          frequencyPenalty: 0.1
          maxCompletionTokens: 4096

        gpt-4o: # Multimodal generalist; typical ctx ~128K per OpenAI era guidance.
          temperature: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 4096

        gpt-4o-mini: # Context window 128K; up to 16K output; great cost/perf.
          temperature: 0.2
          topP: 1.0
          presencePenalty: 0.0
          frequencyPenalty: 0.0
          maxCompletionTokens: 16000   # vendor-stated output max

        o3: # Use maxCompletionTokens on Chat Completions; Responses API uses max_output_tokens.
          topP: 1.0
          maxCompletionTokens: 1024    # caps *visible + reasoning* tokens on Chat Completions
          reasoning-effort: medium             # low|medium|high (supported for o3 family)

      embedding: # 3-small supports dimension shortening; vendor post recommends dims control.
        text-embedding-3-small:
          dimensions: 1536            # default; may set 512 for cheaper vectors
          encodingFormat: float

    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        claude-opus-4-5-latest: # Claude Opus 4.5; most capable for complex reasoning and decomposition.
          maxTokens: 8192
          temperature: 0.7
          topP: 1.0

        claude-sonnet-4-latest: # Claude Sonnet 4; balanced performance for orchestration.
          maxTokens: 4096
          temperature: 0.7
          topP: 1.0

        claude-3-5-haiku-latest: # Claude Haiku 3.5; fast and efficient for simple tasks like title generation.
          maxTokens: 1024
          temperature: 0.5
          topP: 1.0

  decomposer:
    max-branch-factor: ${DECOMPOSER_MAX_BRANCH_FACTOR:3}

  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
  
  sse:
    heartbeat:
      interval-seconds: 20
    connection:
      timeout-millis: 0              # 0 = no timeout
    shutdown:
      grace-period-seconds: 5

  executor:
    run:
      thread-pool:
        core-threads: 2
        max-threads: 5
      task-queue:
        max-capacity: 10
      idle-thread:
        keep-alive-seconds: 60
      shutdown:
        grace-period-seconds: 5