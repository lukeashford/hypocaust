spring:
  application:
    name: the_machine

# OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.example

openai:
  api-key: ${OPENAI_API_KEY}

google:
  custom:
    api-key: ${GOOGLE_CUSTOM_API_KEY}
    csi: ${GOOGLE_CUSTOM_CSI}

app:
  chat-model: openai
  search-engine: google
  candidate-discovery: web-search
  content-retriever: optimized
  extractor: readability
  embedding: local
  topK: 10

  # application.yml
logging:
  level:
    com.example: DEBUG
    dev.langchain4j: DEBUG
    dev.langchain4j.service.AiServiceExecutor: TRACE
    dev.langchain4j.internal: TRACE
    dev.langchain4j.model: TRACE

---
spring:
  config:
    activate:
      on-profile: test
  application:
    name: the_machine

openai:
  api-key: test-key

google:
  custom:
    api-key: test-key
    csi: test-csi

app:
  chat-model: openai
  search-engine: google
  candidate-discovery: web-search
  content-retriever: optimized
  extractor: readability
  embedding: local
  topK: 10